services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: book-recommender:latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vdb:/app/vdb
      - ./mlflow:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT=book-recommender
      - MLFLOW_ARTIFACT_ROOT=http://mlflow:5000  # ← adicione isso
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - app-network

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
      target: mlflow-server
    image: book-recommender-mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: localhost' http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge